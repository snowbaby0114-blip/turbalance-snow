name: scheduler-e2e

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests against scheduler.py
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest tests/ -v

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Install minikube
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x minikube
          sudo mv minikube /usr/local/bin/

      - name: Start 2-node minikube cluster
        run: |
          minikube start --nodes 2 --cpus 2 --memory 2300 --driver=docker
          kubectl get nodes -o wide

      - name: Build scheduler image and load it into the cluster
        run: |
          docker build -t custom-scheduler:latest .
          minikube image load custom-scheduler:latest

      - name: Deploy the custom scheduler
        run: |
          kubectl apply -f scheduler-rbac.yaml
          kubectl apply -f scheduler-deployment.yaml
          kubectl rollout status deployment/custom-scheduler --timeout=120s

      - name: Schedule pod1, pod2, pod3 in order
        run: |
          kubectl apply -f pod1.yaml
          sleep 5
          kubectl apply -f pod2.yaml
          sleep 5
          kubectl apply -f pod3.yaml
          sleep 10

      - name: Verify all three pods were bound by custom-scheduler
        run: |
          for pod in pod1 pod2 pod3; do
            node=$(kubectl get pod "$pod" -o jsonpath='{.spec.nodeName}')
            sched=$(kubectl get pod "$pod" -o jsonpath='{.spec.schedulerName}')
            echo "$pod -> node=$node scheduler=$sched"
            if [ -z "$node" ]; then
              echo "FAIL: $pod was never bound to a node"
              exit 1
            fi
            if [ "$sched" != "custom-scheduler" ]; then
              echo "FAIL: $pod did not request custom-scheduler"
              exit 1
            fi
          done

      - name: Capture live cluster state and scheduler logs
        if: always()
        run: |
          {
            echo "=== kubectl get nodes -o wide ==="
            kubectl get nodes -o wide
            echo
            echo "=== kubectl get pods -o wide ==="
            kubectl get pods -o wide
            echo
            echo "=== custom-scheduler logs ==="
            kubectl logs -l app=custom-scheduler
          } | tee live-results.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-cluster-results
          path: live-results.txt
